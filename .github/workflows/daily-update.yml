name: Daily Content Update

on:
  schedule:
    - cron: "0 0,8,16 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest news
        run: npm run fetch-news

      - name: Commit data updates
        run: |
          git config user.name "AI Daily Bot"
          git config user.email "bot@ai-daily.dev"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: update AI news data [skip ci]"
            git push
          fi

      - name: Trigger Vercel Deployment
        if: always()
        run: |
          curl -s -X POST "https://api.vercel.com/v13/deployments" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "ai-daily",
              "projectId": "prj_t4B3maru04ZZzyii00jFf6DYx9dN",
              "target": "production",
              "gitSource": {
                "type": "github",
                "ref": "main",
                "repoId": 1240321861
              }
            }'
