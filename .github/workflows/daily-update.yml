name: Daily Content Update

on:
  schedule:
    # Run at 00:00, 08:00, 16:00 UTC daily (08:00, 16:00, 00:00 Beijing time)
    - cron: "0 0,8,16 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest news
        run: npm run fetch-news

      - name: Commit data updates
        run: |
          git config user.name "AI Daily Bot"
          git config user.email "bot@ai-daily.dev"
          git add data/
          if git diff --cached --quiet; then
            echo "No new data to commit"
          else
            git commit -m "chore: update AI news data [skip ci]"
            git push
          fi
